# Airflow version (3.0.0 pulled successfully in your build, so keep it)
airflowVersion: "3.0.0"

# Executor – production choice
executor: "KubernetesExecutor"

images:
  airflow:
    repository: localhost/airflow-custom   # your built & loaded image
    tag: "poc-latest"
    pullPolicy: IfNotPresent

# Database – bundled Postgres for POC
postgresql:
  enabled: true
  auth:
    postgresPassword: airflow
    username: airflow
    password: airflow
    database: airflow
  persistence:
    enabled: true
    size: 2Gi

# DAGs persistence & git-sync (your public repo – HTTPS is fine & secure)
dags:
  persistence:
    enabled: true
    size: 1Gi
  gitSync:
    enabled: true
    repo: https://github.com/srathdataengg/sports-streaming-rag-ai.git  # ← your real repo
    branch: main
    rev: HEAD
    depth: 1
    period: 30s
    subPath: airflow-poc/dags   # ← correct path to your DAGs in the repo
    # No sshKeySecret / credentialsSecret needed for public repo
    # If repo becomes private later: add sshKeySecret + knownHosts (see notes below)

logs:
  persistence:
    enabled: true
    size: 5Gi
  # Remote logging to MinIO (S3 compatible)
  remote_logging: "True"
  remote_base_log_folder: "s3://airflow-logs"
  remote_log_conn_id: "minio_default"

# MinIO – deployed via subchart (S3-compatible for bronze/silver/gold + logs)
minio:
  enabled: true
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin123   # ← change this in real prod!
  defaultBuckets: "bronze,silver,gold,airflow-logs"  # auto-created on startup
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi

# MinIO connection (for S3 hook in DAGs + remote logging)
extraConnections:
  - id: minio_default
    type: aws
    extra: |
      {
        "aws_access_key_id": "minioadmin",
        "aws_secret_access_key": "minioadmin123",
        "endpoint_url": "http://minio.minio.svc.cluster.local:9000",
        "region_name": "us-east-1"
      }

# Workers – tuned for M1 Mac (low resources to avoid OOM)
workers:
  replicas: 2
  resources:
    requests:
      cpu: "300m"
      memory: "768Mi"
    limits:
      cpu: "1200m"
      memory: "2Gi"

scheduler:
  resources:
    requests:
      cpu: "400m"
      memory: "1Gi"

webserver:
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
  defaultUser:
    enabled: true
    username: admin
    password: admin
    email: admin@example.com

# Security – good defaults
securityContexts:
  pod:
    runAsUser: 50000
    fsGroup: 0
  container:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

# Expose UI – use port-forward for local POC
webserver:
  service:
    type: ClusterIP
  ingress:
    enabled: false

# No Redis needed for KubernetesExecutor
redis:
  enabled: false